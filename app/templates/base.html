<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeRide - {% block title %}Главная{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="{{ url_for('trips.home') }}" class="navbar-brand">HomeRide</a>
            <div class="navbar-menu">
                {% if current_user.is_authenticated %}
                    <a href="{{ url_for('trips.search') }}">Найти поездку</a>
                    <a href="{{ url_for('trips.create') }}">Создать поездку</a>
                    <a href="{{ url_for('trips.my_trips') }}">Мои поездки</a>
                    <a href="{{ url_for('auth.profile') }}">Профиль</a>
                    <a href="{{ url_for('auth.logout') }}">Выйти ({{ current_user.first_name }})</a>
                {% else %}
                    <a href="{{ url_for('trips.search') }}">Найти поездку</a>
                    <a href="{{ url_for('auth.login') }}">Войти</a>
                    <a href="{{ url_for('auth.register') }}">Регистрация</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    
    </main>    <script src="{{ url_for('static', filename='js/phone-mask.js') }}"></script>
</body>
</html>
